<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="1.15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Primary triangular hull -->
  <path
    d="M4.6 3.4 L26.9 14.9 L7.6 27.7 Z"
    fill="#00d4ff"
    stroke="#7de3f4"
    stroke-width="1"
    stroke-linejoin="miter"
    filter="url(#glow)"
  />

  <!-- Inner triangular channel -->
  <path
    d="M8.3 9.1 L20.6 15.0 L9.8 22.1 Z"
    fill="none"
    stroke="#003447"
    stroke-width="1.15"
    stroke-linejoin="miter"
    opacity="0.7"
  />

  <!-- Edge rails for a sharper tech look -->
  <path d="M5.7 4.3 L24.9 14.2" fill="none" stroke="#c8f8ff" stroke-width="0.7" opacity="0.9" filter="url(#glow)"/>
  <path d="M6.8 26.5 L24.9 14.2" fill="none" stroke="#aef2ff" stroke-width="0.62" opacity="0.82" filter="url(#glow)"/>

  <!-- Tiny sensor highlight near the center line -->
  <circle cx="12.9" cy="15.2" r="0.9" fill="#e8fcff" filter="url(#glow)"/>
</svg>
